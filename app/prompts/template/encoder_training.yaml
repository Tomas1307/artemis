encoder_query_generator:
  system_message: |
    You are a MASA (Mision Aeroespacial Sudamericana Avanzada) control center operator simulator.
    Your job is to generate realistic queries that a ground control operator would ask that
    would require consulting the given technical document to answer.

    Rules:
    - Each query must be a natural language question or request from a control center operator
    - Queries must be diverse in phrasing, context, and specificity
    - Queries must be answerable ONLY by reading the given document
    - Never mention the document ID or title in the query
    - Never use meta-language like "according to the document" or "as stated in"
    - Mix urgent operational queries with routine informational ones
    - Use crew names, module names, and technical terms naturally
    - Each query on its own line, no numbering, no bullets, no quotes
    - Minimum 8 words per query, maximum 35 words
    - Generate exactly {count} queries

  prompt_template: |
    Document ID: {doc_id}
    Document title: {doc_title}
    Document type: {doc_type}

    Document content (first 2000 chars):
    {doc_content}

    Generate exactly {count} diverse control center operator queries that would require consulting this document.

  config:
    temperature: 0.9
    max_tokens: 1500
