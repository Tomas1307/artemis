# ==============================================================================
# PAST MISSIONS — Cóndor-1 to Cóndor-7
# ==============================================================================
missions:
  Cóndor-1:
    name: Initial Orbital Insertion
    type: automated
    start_date: "2029-03-15"
    end_date: "2029-03-22"
    duration_days: 7
    crew: []
    objective: Deploy Kuntur Station into target LEO orbit at 408 km altitude
    outcome: success
    notes: Fully automated. All six modules pressurized and functional post-deployment.

  Cóndor-2:
    name: First Crewed Mission
    type: crewed
    start_date: "2029-08-20"
    end_date: "2030-02-18"
    duration_days: 182
    crew: [commander, pilot, engineer]
    objective: Initial station commissioning, life support activation, baseline telemetry calibration
    outcome: success
    notes: Commander Reyes led commissioning. Minor CO2 scrubber calibration issue resolved in week 2.

  Cóndor-3:
    name: Full Crew Activation and Laboratory Commissioning
    type: crewed
    start_date: "2030-01-10"
    end_date: "2030-07-08"
    duration_days: 179
    crew: [commander, pilot, specialist_1, specialist_2, engineer, medical_officer]
    objective: Activate Quetzal laboratory, commission all 12 workstations, begin science program
    outcome: success
    notes: First full 6-person crew. Quetzal workstations 7-12 required recalibration.

  Cóndor-4:
    name: Emergency Thermal Repair Mission
    type: emergency_repair
    start_date: "2030-06-05"
    end_date: "2030-06-19"
    duration_days: 14
    crew: [engineer, medical_officer]
    objective: Emergency replacement of Jaguar thermal control unit after cooling system failure
    outcome: success
    notes: Jaguar temperature reached 47.3 C (high alert) before repair. Cooling unit replaced via EVA.

  Cóndor-5:
    name: Automated Cargo Resupply
    type: cargo
    start_date: "2030-11-22"
    end_date: "2030-11-28"
    duration_days: 6
    crew: [pilot, engineer]
    objective: Receive automated supply vessel at Vicuña docking port, transfer 2.4 tonnes of supplies
    outcome: success
    notes: Docking on first attempt. Minor pressure differential of 3.2 kPa resolved before transfer.

  Cóndor-6:
    name: Full Crew Rotation and Equipment Upgrade
    type: crew_rotation
    start_date: "2031-04-18"
    end_date: "2031-10-15"
    duration_days: 180
    crew: [commander, pilot, specialist_1, specialist_2, engineer, medical_officer]
    objective: Complete crew rotation and installation of upgraded Colibrí antenna array
    outcome: success
    notes: Current crew assumed station on this mission. New antenna array increased comm bandwidth by 40%.

  Cóndor-7:
    name: Current Operational Mission
    type: crewed_ongoing
    start_date: "2031-09-01"
    end_date: null
    duration_days: null
    crew: [commander, pilot, specialist_1, specialist_2, engineer, medical_officer]
    objective: Continued scientific operations, station maintenance, and preparation for Cóndor-8 supply rendezvous
    outcome: in_progress
    notes: Ongoing. Primary focus on Quetzal microgravity biology experiments (Al-Hassan, Phase 3).
