meta:
  station_name: Kuntur Station
  orbit: Low Earth Orbit (LEO)
  altitude_km: 408
  agency: MASA
  agency_full: Misión Aeroespacial Sudamericana Avanzada
  founded: 2028
  headquarters: Bogotá, Colombia
  current_mission: Cóndor-7
  mission_start: "2031-09-01"

# ==============================================================================
# MODULES
# Each module defines alert thresholds for all telemetry metrics.
# Severity bands are strictly non-overlapping. Direction matters:
#   temperature/radiation/humidity_high: low_max < medium_max < high_max < critical_min
#   pressure/oxygen/humidity_low: critical_max < high_max < medium_max < low_max
# ==============================================================================
modules:
  condor:
    name: Cóndor
    function: Command and control
    role: Main control hub for all station operations
    crew_capacity: 2
    primary_crew: [commander, pilot]
    systems: [ventilation, heating, lighting, cooling, filtration]
    telemetry:
      temperature:
        unit: celsius
        normal_min: 20.0
        normal_max: 24.0
        low_alert_max: 30.0
        medium_alert_max: 40.0
        high_alert_max: 55.0
        critical_above: 55.0
      pressure:
        unit: kPa
        normal_min: 99.0
        normal_max: 103.0
        low_alert_min: 95.0
        medium_alert_min: 90.0
        high_alert_min: 85.0
        critical_below: 85.0
      oxygen:
        unit: percent
        normal_min: 19.5
        normal_max: 23.5
        low_alert_min: 18.0
        medium_alert_min: 16.0
        high_alert_min: 14.0
        critical_below: 14.0
      radiation:
        unit: mSv_per_hour
        normal_max: 0.5
        low_alert_max: 1.0
        medium_alert_max: 2.0
        high_alert_max: 5.0
        critical_above: 5.0
      humidity:
        unit: percent
        normal_min: 40
        normal_max: 60
        low_alert_band: [30, 39]
        low_alert_high_band: [61, 70]
        medium_alert_band: [20, 29]
        medium_alert_high_band: [71, 80]
        high_alert_band: [15, 19]
        high_alert_high_band: [81, 90]
        critical_below: 15
        critical_above: 90
      power:
        unit: percent_rated_capacity
        normal_max: 80
        low_alert_max: 88
        medium_alert_max: 93
        high_alert_max: 97
        critical_above: 97

